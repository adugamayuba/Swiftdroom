<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Swiftdroom</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        width: 1280px;
        height: 800px;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #031414;
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .wrap {
        text-align: center;
        padding: 48px;
      }
      h1 {
        font-size: 56px;
        font-weight: 700;
        letter-spacing: -0.02em;
        margin-bottom: 16px;
      }
      p {
        font-size: 22px;
        color: rgba(255, 255, 255, 0.72);
        max-width: 640px;
        line-height: 1.5;
      }
      .pill {
        display: inline-block;
        margin-top: 32px;
        padding: 10px 20px;
        border-radius: 999px;
        background: rgba(209, 213, 255, 0.12);
        color: #d1d5ff;
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Swiftdroom</h1>
      <p>Autofill Workday, Greenhouse, and Lever applications. Generate tailored AI answers in one click.</p>
      <div class="pill">Product demo</div>
    </div>
  </body>
</html>
