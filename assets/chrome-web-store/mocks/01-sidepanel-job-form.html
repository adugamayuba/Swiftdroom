<!DOCTYPE html>
<html lang="en" class="browser-mock">
  <head>
    <meta charset="UTF-8" />
    <title>Swiftdroom — Screenshot 1</title>
    <link rel="stylesheet" href="shared.css" />
  </head>
  <body>
    <div class="frame">
      <div class="browser-bar">
        <div class="dots"><span></span><span></span><span></span></div>
        <div class="url-bar">boards.greenhouse.io/acme/jobs/4829101</div>
      </div>
      <div class="content-row">
        <div class="job-page">
          <h1>Software Engineer</h1>
          <p class="company">Acme Corp · San Francisco, CA · Full-time</p>
          <div class="form-grid">
            <div class="field">
              <label>First name</label>
              <input type="text" value="Jordan" class="filled" />
            </div>
            <div class="field">
              <label>Last name</label>
              <input type="text" value="Lee" class="filled" />
            </div>
            <div class="field">
              <label>Email</label>
              <input type="text" value="jordan.lee@email.com" class="filled" />
            </div>
            <div class="field">
              <label>Phone</label>
              <input type="text" value="+1 (415) 555-0142" class="filled" />
            </div>
            <div class="field">
              <label>LinkedIn</label>
              <input type="text" value="linkedin.com/in/jordanlee" />
            </div>
            <div class="field">
              <label>Website</label>
              <input type="text" placeholder="https://" />
            </div>
            <div class="field full">
              <label>Why do you want to work at Acme?</label>
              <textarea placeholder="Your answer…"></textarea>
            </div>
          </div>
        </div>
        <aside class="sidepanel">
          <div class="brand-row">
            <span class="brand">Swiftdroom</span>
            <span class="badge">12 / 50 apps</span>
          </div>
          <select class="persona" disabled>
            <option>Product Manager — Resume A</option>
          </select>
          <button class="btn-primary">Scan &amp; Autofill</button>
          <button class="btn-secondary">Rescan Fields</button>
          <p class="section-title">Getting started</p>
          <p style="font-size: 12px; color: #64748b; line-height: 1.5">
            Open a job application, then scan to map and fill fields from your persona.
          </p>
          <p class="footer-note">Co-pilot mode: review all fields before submitting.</p>
        </aside>
      </div>
    </div>
  </body>
</html>
